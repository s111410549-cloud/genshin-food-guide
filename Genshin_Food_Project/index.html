<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>提瓦特美食札記</title>
    <style>
        /* 基礎美化 */
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #f4f1e9; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        header { width: 100%; text-align: center; padding: 20px; color: #84643a; }
        
        /* 主要內容區：左邊功能，右邊插圖 */
        .main-container {
            display: flex;
            max-width: 1200px;
            width: 95%;
            gap: 20px;
            margin-bottom: 50px;
        }

        /* 左側內容 */
        .content-left { flex: 3; }

        /* 右側裝飾插圖區 */
        .content-right { 
            flex: 1; 
            background: white; 
            border-radius: 12px; 
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .side-img { width: 100%; border-radius: 8px; margin-bottom: 10px; }

        /* 表單與卡片 */
        .form-box { 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 30px; 
        }
        .form-box input, .form-box select, .form-box textarea { width: 100%; margin: 5px 0 15px; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; }
        
        #displayArea { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .food-card { background: white; padding: 15px; border-radius: 10px; display: flex; align-items: center; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #d3a056; }
        .food-card img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; margin-right: 15px; background: #eee; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: #ff4d4d; color: white; border: none; border-radius: 4px; cursor: pointer; padding: 2px 8px; font-size: 11px; }
        .category-tag { background: #f0e6d2; color: #84643a; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        
        .food-info strong { display: block; margin: 3px 0; color: #333; }
        .food-info p { font-size: 12px; color: #666; margin: 0; line-height: 1.4; }
    </style>
</head>
<body>
    <header>
        <h1>🍴 提瓦特美食札記</h1>
    </header>

    <div class="main-container">
        <div class="content-left">
            <div class="form-box" id="adminBox">
                <h3 style="margin-top:0; color:#84643a;">新增料理圖鑑</h3>
                <input type="text" id="name" placeholder="料理名稱">
                <select id="category">
                    <option value="主食">主食</option>
                    <option value="點心">點心</option>
                    <option value="飲品">飲品</option>
                    <option value="水果">水果</option>
                </select>
                <textarea id="intro" placeholder="輸入料理介紹..."></textarea>
                <input type="file" id="image" accept="image/*">
                <button onclick="upload()" style="width:100%; padding:12px; background:#d3a056; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">存入圖鑑</button>
            </div>

            <h2 style="color: #84643a;">📜 我的美食圖鑑</h2>
            <div id="displayArea"></div>
        </div>

        <div class="content-right">
            <h4 style="margin-top:0; color:#84643a;">今日推薦</h4>
            <img src="https://api.paugram.com/wallpaper/?source=gt" class="side-img" alt="插圖">
            <p style="font-size: 13px; color: #666;">「即便在旅途中，也不要忘記品嚐美食喔！」</p>
            <div style="border-top: 1px dashed #ccc; margin: 15px 0;"></div>
            <p style="font-size: 12px; color: #999;">旅行者專屬筆記本</p>
        </div>
    </div>

    <script>
        // 自動判斷是在本地還是 GitHub Pages
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        // 如果不是本地，就隱藏新增功能（因為 Pages 無法直接寫入檔案）
        if (!isLocal) {
            document.getElementById('adminBox').style.display = 'none';
        }

        async function upload() {
            const fileInput = document.getElementById('image');
            if(!document.getElementById('name').value || !fileInput.files[0]) {
                return alert('名稱跟圖片都要有喔！');
            }

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('category', document.getElementById('category').value);
            formData.append('intro', document.getElementById('intro').value);
            formData.append('foodImage', fileInput.files[0]);

            await fetch('/add-food', { method: 'POST', body: formData });
            location.reload();
        }

        async function remove(id) {
            if(!confirm('確定要刪除嗎？')) return;
            await fetch('/delete-food', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id })
            });
            location.reload();
        }

        async function load() {
            // 重要：改為讀取同目錄下的 data.json，GitHub Pages 才能顯示
            const res = await fetch('data.json');
            const data = await res.json();
            const area = document.getElementById('displayArea');
            
            data.forEach(item => {
                area.innerHTML += `
                    <div class="food-card">
                        ${isLocal ? `<button class="delete-btn" onclick="remove(${item.id})">刪除</button>` : ''}
                        <img src="${item.image}" onerror="this.src='https://via.placeholder.com/70?text=Food'">
                        <div class="food-info">
                            <span class="category-tag">${item.category}</span>
                            <strong>${item.name}</strong>
                            <p>${item.intro || '尚未加入介紹'}</p>
                        </div>
                    </div>`;
            });
        }
        load();
    </script>
</body>
</html>
