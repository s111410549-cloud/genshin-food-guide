<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>提瓦特美食札記 - 雲端版</title>
    <style>
        /* 基礎質感與手帳底紋 */
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #f4f1e9; margin: 0; 
            display: flex; flex-direction: column; align-items: center; color: #4a3e2e;
            background-image: radial-gradient(#d4a373 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            overflow-x: hidden; /* 防止粒子導致捲軸出現 */
        }
        
        header { 
            width: 100%; text-align: center; padding: 40px 0 10px 0; 
            color: #84643a; font-size: 32px; font-weight: bold; letter-spacing: 5px;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.8);
        }

        /* 裝飾貼紙修正 */
        .deco-sticker {
            position: absolute; pointer-events: none;
            filter: drop-shadow(3px 3px 2px rgba(0,0,0,0.1));
            z-index: 5; opacity: 0.9;
        }
        /* 💡 隱藏破圖：沒網址就不顯示 */
        img:not([src]), img[src=""], img[src*="undefined"] { opacity: 0 !important; }

        .main-container { position: relative; width: 90%; max-width: 1000px; z-index: 1; }

        /* 上方拍立得展示區 */
        .gallery-container { display: flex; justify(content): center; gap: 25px; padding: 30px 0; perspective: 1000px; }
        .gallery-item { 
            flex: 0 1 280px; background: white; padding: 10px 10px 35px 10px;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #e8e4d8;
            /* 💡 鼠標變叉子 */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>🍴</text></svg>"), auto;
        }
        .gallery-item:nth-child(1) { transform: rotate(-4deg) translateY(10px); }
        .gallery-item:nth-child(2) { transform: rotate(2deg) translateY(-5px); z-index: 2; }
        .gallery-item:nth-child(3) { transform: rotate(-2deg) translateY(15px); }
        .gallery-item:hover { transform: scale(1.1) rotate(0deg) translateY(-10px) !important; z-index: 10; }
        .gallery-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }

        /* 篩選控制區 */
        .filter-box {
            margin: 20px 0; display: flex; align-items: center; gap: 15px;
            background: white; padding: 10px 25px; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #d4a373;
        }
        .filter-box label { font-weight: bold; color: #84643a; }
        .filter-box select { 
            border: none; outline: none; background: transparent; 
            font-size: 16px; color: #5d4037; cursor: pointer;
        }

        /* 管理員表單 */
        .form-container { 
            display: none; background: rgba(255, 255, 255, 0.95); padding: 30px; 
            border-radius: 20px; border: 2px dashed #d4a373; margin-bottom: 40px;
        }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 15px; background: #84643a; color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }

        /* 食物圖鑑展示區 */
        #displayArea { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 30px; width: 90%; max-width: 1000px; padding-bottom: 80px;
        }
        .food-card { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column;
            transition: all 0.3s; border: 1px solid rgba(212, 163, 115, 0.1); height: 100%;
            /* 💡 鼠標變叉子 */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>🍴</text></svg>"), auto;
        }
        .food-card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
        .food-card img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; }
        .food-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        
        /* 讓按鈕跟選單維持原本的點擊手勢，不然會變叉子很奇怪 */
        .delete-btn, select, input, textarea, .save-btn { cursor: pointer !important; }

        .category-tag { background: #f0e6d2; color: #84643a; padding: 3px 12px; border-radius: 50px; font-size: 11px; font-weight: bold; margin-bottom: 10px; align-self: flex-start; }
        .food-name { font-size: 20px; font-weight: bold; color: #5d4037; margin: 5px 0; }
        .food-intro { font-size: 13px; color: #7d6b5d; line-height: 1.6; margin-bottom: 15px; flex-grow: 1; }
        .delete-btn { background: #ff5e5e; color: white; border: none; padding: 5px 12px; border-radius: 6px; font-size: 12px; align-self: flex-end; }
    </style>
</head>
<body>

<header>🍴 提瓦特美食札記</header>

<div class="main-container">
    <img id="sticker1" src="" class="deco-sticker" style="width:120px; top:-50px; left:-60px; transform: rotate(-15deg);">
    <img id="sticker2" src="" class="deco-sticker" style="width:100px; bottom:-20px; right:-50px; transform: rotate(15deg);">

    <div class="gallery-container">
        <div class="gallery-item"><img id="img1" src="https://via.placeholder.com/400x400?text=Wait..."></div>
        <div class="gallery-item"><img id="img2" src="https://via.placeholder.com/400x400?text=Wait..."></div>
        <div class="gallery-item"><img id="img3" src="https://via.placeholder.com/400x400?text=Wait..."></div>
    </div>

    <div class="filter-box">
        <label>🔍 品項找尋：</label>
        <select id="filterCategory">
            <option value="全部">全部顯示</option>
            <option value="主食">僅看 主食</option>
            <option value="飲品">僅看 飲品</option>
            <option value="點心">僅看 點心</option>
        </select>
    </div>

    <div class="form-container" id="adminForm">
        <h3 style="margin-top:0; color:#84643a;">新增紀錄</h3>
        <input type="text" id="name" placeholder="料理名稱">
        <select id="category">
            <option value="主食">主食</option>
            <option value="飲品">飲品</option>
            <option value="點心">點心</option>
        </select>
        <textarea id="intro" rows="2" placeholder="口感描述..."></textarea>
        <input type="text" id="foodImgUrl" placeholder="料理圖片網址">
        <button class="save-btn" id="uploadBtn">收錄札記</button>
        <hr style="margin: 20px 0; border: 0; border-top: 1px dashed #d4a373;">
        <p style="font-size: 12px; color: #84643a;">修改封面網址 (Enter 儲存)：</p>
        <input type="text" id="url1" placeholder="封面 1" onkeypress="updateGallery(event, 1)">
        <input type="text" id="url2" placeholder="封面 2" onkeypress="updateGallery(event, 2)">
        <input type="text" id="url3" placeholder="封面 3" onkeypress="updateGallery(event, 3)">
    </div>
</div>

<div id="displayArea"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, setDoc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCObKMkSnYZip04WBNyPC5gIDabK2VYevE",
        authDomain: "genshin-food-cloud.firebaseapp.com",
        projectId: "genshin-food-cloud",
        storageBucket: "genshin-food-cloud.firebasestorage.app",
        messagingSenderId: "77374518719",
        appId: "1:77374518719:web:fd859216db13a4b55e5d0a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const isAdmin = new URLSearchParams(window.location.search).get('mode') === 'admin';
    if (isAdmin) document.getElementById('adminForm').style.display = 'block';

    // 載入封面圖
    async function loadGallery() {
        const docSnap = await getDoc(doc(db, "settings", "gallery"));
        if (docSnap.exists()) {
            const data = docSnap.data();
            if(data.url1) document.getElementById('img1').src = data.url1;
            if(data.url2) document.getElementById('img2').src = data.url2;
            if(data.url3) document.getElementById('img3').src = data.url3;
        }
    }
    loadGallery();

    window.updateGallery = async (e, index) => {
        if (e.key === 'Enter') {
            const url = e.target.value;
            const updateData = {}; updateData[`url${index}`] = url;
            await setDoc(doc(db, "settings", "gallery"), updateData, { merge: true });
            location.reload();
        }
    };

    let allFoods = [];
    const q = query(collection(db, "foods"), orderBy("createdAt", "desc"));
    
    onSnapshot(q, (snapshot) => {
        allFoods = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderFoods("全部");
    });

    document.getElementById('filterCategory').addEventListener('change', (e) => {
        renderFoods(e.target.value);
    });

    function renderFoods(filter) {
        const area = document.getElementById('displayArea');
        area.innerHTML = '';
        const filtered = filter === "全部" ? allFoods : allFoods.filter(f => f.category === filter);
        
        filtered.forEach((data) => {
            area.innerHTML += `
                <div class="food-card">
                    <img src="${data.image}">
                    <div class="food-content">
                        <span class="category-tag">${data.category}</span>
                        <div class="food-name">${data.name}</div>
                        <p class="food-intro">${data.intro}</p>
                        ${isAdmin ? `<button class="delete-btn" onclick="deleteFood('${data.id}')">刪除紀錄</button>` : ''}
                    </div>
                </div>`;
        });
    }

    document.getElementById('uploadBtn').onclick = async () => {
        const name = document.getElementById('name').value;
        const imgUrl = document.getElementById('foodImgUrl').value;
        if (!name || !imgUrl) return alert("請完整填寫！");
        await addDoc(collection(db, "foods"), {
            name: name, category: document.getElementById('category').value,
            intro: document.getElementById('intro').value, image: imgUrl, createdAt: Date.now()
        });
        alert("已收錄！"); location.reload();
    };

    window.deleteFood = async (id) => {
        if (confirm("要撕掉這頁紀錄嗎？")) await deleteDoc(doc(db, "foods", id)); 
    };

    // 💡 香氣粒子 JS 效果
    document.addEventListener('mousemove', function(e) {
        if (Math.random() > 0.9) { 
            const particle = document.createElement('div');
            particle.innerHTML = '✨';
            particle.style.position = 'fixed';
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            particle.style.pointerEvents = 'none';
            particle.style.fontSize = '12px';
            particle.style.color = '#d4a373';
            particle.style.zIndex = '9999';
            particle.style.transition = 'all 1s ease-out';
            document.body.appendChild(particle);
            setTimeout(() => {
                particle.style.transform = `translateY(-50px) rotate(${Math.random() * 360}deg)`;
                particle.style.opacity = '0';
            }, 10);
            setTimeout(() => { particle.remove(); }, 1000);
        }
    });
</script>
</body>
</html>
