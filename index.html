<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>提瓦特美食札記</title>
    <style>
        /* 1. 全局樣式與餐具游標 */
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #f4f1e9; margin: 0; 
            display: flex; flex-direction: column; align-items: center; color: #4a3e2e;
            background-image: radial-gradient(#d4a373 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            overflow-x: hidden;
            /* 餐具游標 */
            cursor: url('https://cur.cursors-4u.net/food/foo-7/foo668.cur'), auto;
        }

        header { padding: 40px 0 20px 0; font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #84643a; }
        
        /* 2. 星星特效樣式 */
        .star {
            position: absolute;
            background-color: #ffcc00;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px #ffcc00, 0 0 5px #fff;
            z-index: 9999;
            animation: fadeOut 0.8s ease-out forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1) rotate(0deg); }
            100% { opacity: 0; transform: scale(0.2) rotate(180deg); }
        }

        /* 3. 日記感相框容器 */
        #displayArea { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 50px; 
            width: 90%; 
            max-width: 1100px; 
            padding: 50px 0; 
        }
        
        /* 食物卡片 - 傾斜設計 */
        .food-card { 
            background: white; 
            padding: 15px 15px 30px 15px;
            box-shadow: 5px 8px 15px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 1px solid #e8e4d8; 
            position: relative;
        }

        /* 隨機傾斜效果 (透過 nth-child 模擬) */
        .food-card:nth-child(odd) { transform: rotate(-2.5deg); }
        .food-card:nth-child(even) { transform: rotate(2.5deg); }
        .food-card:nth-child(3n) { transform: rotate(-1.5deg); }

        /* 滑鼠移入：卡片擺正並浮起 */
        .food-card:hover { 
            transform: rotate(0deg) scale(1.05) translateY(-10px); 
            z-index: 50; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); 
        }

        .food-card img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; border-radius: 2px; }
        
        /* 4. 隱藏說明文字：滑鼠移入才顯示 */
        .food-content { 
            padding: 15px 5px 0 5px; 
            max-height: 40px; /* 平時高度 */
            overflow: hidden; 
            transition: max-height 0.6s ease; 
        }
        .food-card:hover .food-content { max-height: 500px; } /* 展開描述 */

        .food-name { font-size: 19px; font-weight: bold; color: #5d4037; border-bottom: 1px dashed #d4a373; padding-bottom: 8px; }
        
        .food-intro { 
            font-size: 14px; color: #7d6b5d; line-height: 1.6; padding-top: 10px; margin: 0; 
            opacity: 0; transform: translateY(10px); transition: 0.4s;
        }
        .food-card:hover .food-intro { opacity: 1; transform: translateY(0); }

        /* 5. 黃色刪除按鈕 */
        .btn-delete { 
            margin-top: 15px;
            background-color: #ffcc00; 
            color: #5d4037; 
            border: none; 
            padding: 6px 12px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: bold;
            border-radius: 4px;
            transition: 0.3s;
            align-self: flex-end;
        }
        .btn-delete:hover { background-color: #e6b800; transform: scale(1.1); }

        /* 其他原有美化 */
        .gallery-container { display: flex; justify-content: center; gap: 30px; padding: 40px 0; }
        .gallery-item { position: relative; background: white; padding: 10px 10px 35px 10px; box-shadow: 5px 10px 20px rgba(0,0,0,0.1); border: 1px solid #e8e4d8; width: 200px; transition: 0.3s; }
        .gallery-item:hover { transform: scale(1.1); }
        .gallery-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        .bubble { position: absolute; top: -40px; left: 50%; transform: translateX(-50%); background: #fffdf7; border: 1.5px solid #d4a373; padding: 5px 12px; border-radius: 15px; font-size: 12px; opacity: 0; transition: 0.3s; pointer-events: none; }
        .gallery-item:hover .bubble { opacity: 1; top: -50px; }

        .filter-box { margin-bottom: 20px; background: white; padding: 10px 25px; border-radius: 50px; border: 1px solid #d4a373; }
        .form-container { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed #d4a373; margin-bottom: 40px; width: 320px;}
        input, select, textarea { width: 100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .comment-section { width: 90%; max-width: 800px; margin-bottom: 100px; background: #fffdf7; border: 1px solid #d4a373; padding: 30px; box-shadow: 8px 8px 0px #d4a373; }
    </style>
</head>
<body>

<header>🍴 提瓦特美食札記</header>

<div class="gallery-container">
    <div class="gallery-item" style="transform: rotate(-3deg);">
        <div class="bubble">我不是應急食品！</div>
        <img id="img1" src="https://via.placeholder.com/400x400?text=載入中...">
    </div>
    <div class="gallery-item" style="transform: rotate(2deg);">
        <div class="bubble">今天也要好好吃飯！</div>
        <img id="img2" src="https://via.placeholder.com/400x400?text=載入中...">
    </div>
    <div class="gallery-item" style="transform: rotate(-1deg);">
        <div class="bubble">三彩糰子...好吃</div>
        <img id="img3" src="https://via.placeholder.com/400x400?text=載入中...">
    </div>
</div>

<div class="filter-box">
    <label>🔍 翻閱品項：</label>
    <select id="filterCategory">
        <option value="全部">全部顯示</option>
        <option value="主食">主食</option>
        <option value="飲品">飲品</option>
        <option value="點心">點心</option>
    </select>
</div>

<div class="form-container" id="adminForm">
    <input type="text" id="name" placeholder="料理名稱">
    <select id="category">
        <option value="主食">主食</option>
        <option value="飲品">飲品</option>
        <option value="點心">點心</option>
    </select>
    <textarea id="intro" placeholder="味道描述..."></textarea>
    <input type="text" id="foodImageUrl" placeholder="圖片網址">
    <button onclick="addFood()" style="width:100%; background:#84643a; color:white; border:none; padding:10px; cursor:pointer;">存入札記</button>
</div>

<div id="displayArea"></div>

<div class="comment-section">
    <h3>📜 食客留書</h3>
    <div id="commentList"></div>
    <div style="margin-top: 20px; display:flex; gap:10px;">
        <input type="text" id="commentUser" placeholder="冒險者大名">
        <input type="text" id="commentContent" placeholder="留言...">
        <button onclick="sendComment()" style="background:#84643a; color:white; border:none; padding:5px 15px; cursor:pointer;">送出</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCObKMkSnYZip04WBNyPC5gIDabK2VYevE",
        authDomain: "genshin-food-cloud.firebaseapp.com",
        projectId: "genshin-food-cloud",
        storageBucket: "genshin-food-cloud.appspot.com",
        messagingSenderId: "77374518719",
        appId: "1:77374518719:web:fd859216db13a4b55e5d0a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 星星特效 JS ---
    document.addEventListener('mousemove', function(e) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = (e.pageX - 2) + 'px';
        star.style.top = (e.pageY - 2) + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    });

    const isAdmin = new URLSearchParams(window.location.search).get('mode') === 'admin';
    if (isAdmin) document.getElementById('adminForm').style.display = 'block';

    async function loadGallery() {
        const docSnap = await getDoc(doc(db, "settings", "gallery"));
        if (docSnap.exists()) {
            const data = docSnap.data();
            if(data.url1) document.getElementById('img1').src = data.url1;
            if(data.url2) document.getElementById('img2').src = data.url2;
            if(data.url3) document.getElementById('img3').src = data.url3;
        }
    }
    loadGallery();

    let allFoods = [];
    onSnapshot(query(collection(db, "foods"), orderBy("createdAt", "desc")), (snapshot) => {
        allFoods = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderFoods(document.getElementById('filterCategory').value);
    });

    function renderFoods(filter) {
        const area = document.getElementById('displayArea');
        area.innerHTML = '';
        const list = filter === "全部" ? allFoods : allFoods.filter(f => f.category === filter);
        
        list.forEach(f => {
            const card = document.createElement('div');
            card.className = 'food-card';
            card.innerHTML = `
                <img src="${f.image}">
                <div class="food-content">
                    <div class="food-name">${f.name}</div>
                    <p class="food-intro">${f.intro || '暫無描述...'}</p>
                </div>`;
            
            if (isAdmin) {
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete';
                delBtn.innerText = '刪除此頁';
                delBtn.onclick = () => { if(confirm("確定撕掉這一頁嗎？")) deleteDoc(doc(db, "foods", f.id)); };
                card.appendChild(delBtn);
            }
            area.appendChild(card);
        });
    }

    window.addFood = async () => {
        const name = document.getElementById('name').value;
        const imageUrl = document.getElementById('foodImageUrl').value;
        const intro = document.getElementById('intro').value;
        if(!name || !imageUrl) return alert("請填寫名稱與網址！");
        await addDoc(collection(db, "foods"), {
            name, image: imageUrl, category: document.getElementById('category').value, 
            intro, createdAt: Date.now()
        });
        alert("存入成功！");
        document.getElementById('name').value = '';
        document.getElementById('foodImageUrl').value = '';
        document.getElementById('intro').value = '';
    };

    onSnapshot(query(collection(db, "comments"), orderBy("createdAt", "desc")), (snapshot) => {
        const list = document.getElementById('commentList');
        list.innerHTML = '';
        snapshot.forEach(d => {
            const c = d.data();
            list.innerHTML += `<div style="padding:10px 0; border-bottom:1px dashed #ddd;">👤 <b>${c.user}</b>: ${c.content}</div>`;
        });
    });

    window.sendComment = async () => {
        const u = document.getElementById('commentUser').value;
        const c = document.getElementById('commentContent').value;
        if(u && c) {
            await addDoc(collection(db, "comments"), { user: u, content: c, createdAt: Date.now() });
            document.getElementById('commentContent').value = '';
        }
    };

    document.getElementById('filterCategory').onchange = (e) => renderFoods(e.target.value);
</script>
</body>
</html>
