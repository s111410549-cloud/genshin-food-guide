<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>提瓦特美食札記</title>
    <style>
        /* 基礎樣式與餐具游標 */
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #f4f1e9; margin: 0; 
            display: flex; flex-direction: column; align-items: center; color: #4a3e2e;
            background-image: radial-gradient(#d4a373 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            overflow-x: hidden;
            /* 餐具符號游標 */
            cursor: url('https://cur.cursors-4u.net/food/foo-7/foo668.cur'), auto !important;
        }

        header { padding: 40px 0 20px 0; font-size: 34px; font-weight: bold; letter-spacing: 5px; color: #84643a; text-shadow: 2px 2px 0px #fff; }
        
        /* 星星特效樣式 */
        .star {
            position: absolute;
            background-color: #ffcc00;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px #ffcc00, 0 0 20px #fff;
            animation: fadeOut 0.8s linear forwards;
            z-index: 9999;
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1) rotate(0deg); }
            to { opacity: 0; transform: scale(0) rotate(180deg); }
        }

        /* 插圖展示區樣式 */
        .gallery-container { display: flex; justify-content: center; gap: 30px; padding: 40px 0; }
        .gallery-item { 
            position: relative; background: white; padding: 10px 10px 35px 10px;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #e8e4d8; width: 200px;
        }
        .gallery-item:nth-child(odd) { transform: rotate(-3deg); }
        .gallery-item:nth-child(even) { transform: rotate(3deg); }
        .gallery-item:hover { transform: scale(1.1) rotate(0deg); z-index: 100; }
        
        /* 食物相片框：手寫筆記感傾斜 */
        #displayArea { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 45px; width: 90%; max-width: 1100px; padding: 50px 0; 
        }

        .food-card { 
            background: white; border-radius: 2px; overflow: hidden; 
            box-shadow: 3px 6px 15px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; transition: all 0.4s ease; 
            border: 1px solid #e8e4d8; padding: 12px;
            position: relative;
        }

        /* 模擬日記傾斜感：奇數向左，偶數向右，3的倍數微斜 */
        .food-card:nth-child(odd) { transform: rotate(-2deg); }
        .food-card:nth-child(even) { transform: rotate(2deg); }
        .food-card:nth-child(3n) { transform: rotate(1.5deg); }
        
        .food-card:hover { 
            transform: rotate(0deg) translateY(-10px) scale(1.02); 
            z-index: 10; box-shadow: 0 15px 35px rgba(132, 100, 58, 0.2); 
        }

        .food-card img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; border-radius: 2px; border: 1px solid #eee; }
        
        .food-name { font-size: 19px; font-weight: bold; color: #5d4037; border-bottom: 1px dashed #d4a373; padding: 10px 0 5px 0; }
        .food-intro { font-size: 14px; color: #7d6b5d; line-height: 1.6; padding-top: 10px; margin: 0; }
        
        /* 刪除按鈕：改成黃色調 */
        .btn-delete-custom { 
            background-color: #ffca28; /* 亮黃色 */
            color: #5d4037; 
            border: none; 
            padding: 8px; 
            margin-top: 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.3s, transform 0.2s;
            font-size: 13px;
            letter-spacing: 2px;
        }
        .btn-delete-custom:hover { background-color: #ffb300; transform: scale(0.95); }

        /* 其他介面 */
        .filter-box { margin-bottom: 30px; background: white; padding: 10px 25px; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #d4a373; }
        .form-container { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed #d4a373; margin-bottom: 40px; width: 320px;}
        input, select, textarea { width: 100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .comment-section { width: 90%; max-width: 800px; margin: 50px 0 100px 0; background: #fffdf7; border: 1px solid #d4a373; padding: 30px; box-shadow: 8px 8px 0px #d4a373; position: relative; }
    </style>
</head>
<body>

<header>🍴 提瓦特美食札記</header>

<div class="gallery-container">
    <div class="gallery-item">
        <div class="bubble">我不是應急食品？</div>
        <img id="img1" src="https://via.placeholder.com/400x400?text=美食載入中">
    </div>
    <div class="gallery-item">
        <div class="bubble">今天也要好好吃飯喔！</div>
        <img id="img2" src="https://via.placeholder.com/400x400?text=美食載入中">
    </div>
    <div class="gallery-item">
        <div class="bubble">三彩糰子...好吃</div>
        <img id="img3" src="https://via.placeholder.com/400x400?text=美食載入中">
    </div>
</div>

<div class="filter-box">
    <label>🔍 翻閱品項：</label>
    <select id="filterCategory">
        <option value="全部">全部顯示</option>
        <option value="主食">主食</option>
        <option value="飲品">飲品</option>
        <option value="點心">點心</option>
    </select>
</div>

<div class="form-container" id="adminForm">
    <div style="font-size: 11px; color: #d4a373; margin-bottom: 10px;">💡 管理員模式：請填寫網址收錄美食</div>
    <input type="text" id="name" placeholder="料理名稱">
    <select id="category">
        <option value="主食">主食</option>
        <option value="飲品">飲品</option>
        <option value="點心">點心</option>
    </select>
    <textarea id="intro" placeholder="味道描述..."></textarea>
    <input type="text" id="foodImageUrl" placeholder="圖片網址 (結尾需為 .jpg/png)">
    <button id="addBtn" onclick="addFood()" style="width:100%; background:#84643a; color:white; border:none; padding:10px; cursor:pointer; border-radius: 5px;">存入相簿</button>
</div>

<div id="displayArea"></div>

<div class="comment-section">
    <h3>📜 食客留書</h3>
    <div id="commentList"></div>
    <div style="margin-top: 20px; display:flex; gap:10px;">
        <input type="text" id="commentUser" placeholder="尊姓大名">
        <input type="text" id="commentContent" placeholder="想說的話...">
        <button onclick="sendComment()" style="background:#84643a; color:white; border:none; padding:5px 15px; cursor:pointer; border-radius: 5px;">留言</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCObKMkSnYZip04WBNyPC5gIDabK2VYevE",
        authDomain: "genshin-food-cloud.firebaseapp.com",
        projectId: "genshin-food-cloud",
        storageBucket: "genshin-food-cloud.appspot.com",
        messagingSenderId: "77374518719",
        appId: "1:77374518719:web:fd859216db13a4b55e5d0a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 星星粒子特效 ---
    document.addEventListener('mousemove', function(e) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = e.pageX + 'px';
        star.style.top = e.pageY + 'px';
        document.body.appendChild(star);
        setTimeout(() => star.remove(), 800);
    });

    const isAdmin = new URLSearchParams(window.location.search).get('mode') === 'admin';
    if (isAdmin) document.getElementById('adminForm').style.display = 'block';

    // 載入大圖
    async function loadGallery() {
        try {
            const docSnap = await getDoc(doc(db, "settings", "gallery"));
            if (docSnap.exists()) {
                const data = docSnap.data();
                if(data.url1) document.getElementById('img1').src = data.url1;
                if(data.url2) document.getElementById('img2').src = data.url2;
                if(data.url3) document.getElementById('img3').src = data.url3;
            }
        } catch (e) { console.error(e); }
    }
    loadGallery();

    // 監聽美食
    let allFoods = [];
    onSnapshot(query(collection(db, "foods"), orderBy("createdAt", "desc")), (snapshot) => {
        allFoods = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderFoods(document.getElementById('filterCategory').value);
    });

    function renderFoods(filter) {
        const area = document.getElementById('displayArea');
        area.innerHTML = '';
        const list = filter === "全部" ? allFoods : allFoods.filter(f => f.category === filter);
        
        list.forEach(f => {
            const card = document.createElement('div');
            card.className = 'food-card';
            card.innerHTML = `
                <img src="${f.image}">
                <div class="food-name">${f.name}</div>
                <p class="food-intro">${f.intro}</p>`;
            
            if (isAdmin) {
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete-custom';
                delBtn.innerText = '🗑️ 撕掉此頁';
                delBtn.onclick = () => { if(confirm("確定要刪除這道美食嗎？")) deleteDoc(doc(db, "foods", f.id)); };
                card.appendChild(delBtn);
            }
            area.appendChild(card);
        });
    }

    window.addFood = async () => {
        const name = document.getElementById('name').value;
        const imageUrl = document.getElementById('foodImageUrl').value;
        if(!name || !imageUrl) return alert("名稱跟圖片都要填喔！");
        await addDoc(collection(db, "foods"), {
            name, image: imageUrl, category: document.getElementById('category').value, 
            intro: document.getElementById('intro').value, createdAt: Date.now()
        });
        alert("存檔成功！");
        document.getElementById('name').value = '';
        document.getElementById('foodImageUrl').value = '';
        document.getElementById('intro').value = '';
    };

    // 留言板
    onSnapshot(query(collection(db, "comments"), orderBy("createdAt", "desc")), (snapshot) => {
        const list = document.getElementById('commentList');
        list.innerHTML = '';
        snapshot.forEach(d => {
            const c = d.data();
            list.innerHTML += `<div style="padding:10px 0; border-bottom:1px dashed #d4a373;">👤 <b>${c.user}</b>: ${c.content}</div>`;
        });
    });

    window.sendComment = async () => {
        const u = document.getElementById('commentUser').value;
        const c = document.getElementById('commentContent').value;
        if(u && c) {
            await addDoc(collection(db, "comments"), { user: u, content: c, createdAt: Date.now() });
            document.getElementById('commentContent').value = '';
        }
    };

    document.getElementById('filterCategory').onchange = (e) => renderFoods(e.target.value);
</script>
</body>
</html>
