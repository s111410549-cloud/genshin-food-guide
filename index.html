<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>提瓦特美食札記 - 手帳版</title>
    <style>
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #f4f1e9; margin: 0; 
            display: flex; flex-direction: column; align-items: center; color: #4a3e2e;
            background-image: radial-gradient(#d4a373 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            overflow-x: hidden;
        }
        
        header { padding: 40px 0 20px 0; font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #84643a; }

        /* 💡 鼠標變叉子 */
        .food-card, .gallery-item { 
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>🍴</text></svg>"), auto;
        }

        .filter-box {
            margin-bottom: 30px; background: white; padding: 10px 25px; border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #d4a373;
        }

        #displayArea { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 40px; width: 90%; max-width: 1100px; padding-bottom: 100px;
        }

        /* 💡 玩法：照片物理擺放感 */
        .food-card { 
            background: white; border-radius: 5px; overflow: hidden; 
            box-shadow: 2px 5px 15px rgba(0,0,0,0.08); 
            display: flex; flex-direction: column;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #e8e4d8;
            padding: 12px 12px 0 12px; /* 像拍立得一樣留邊 */
        }

        /* 讓偶數和奇數卡片有不同的初始傾斜 */
        .food-card:nth-child(odd) { transform: rotate(-1.5deg); }
        .food-card:nth-child(even) { transform: rotate(1.5deg); }

        .food-card:hover { 
            transform: rotate(0deg) translateY(-10px) scale(1.05); /* 移上去擺正並浮起 */
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .food-card img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; border-radius: 3px; }

        /* 💡 玩法：手寫內容動態展開 */
        .food-content { 
            padding: 15px 5px;
            max-height: 50px; /* 初始只看得到標題 */
            transition: max-height 0.5s ease-in-out;
            overflow: hidden;
            background: white;
        }

        .food-card:hover .food-content {
            max-height: 300px; /* 移上去展開全文 */
        }

        .food-name { font-size: 18px; font-weight: bold; color: #5d4037; border-bottom: 1px dashed #d4a373; padding-bottom: 5px; }
        .food-intro { font-size: 14px; color: #7d6b5d; line-height: 1.6; padding-top: 10px; margin: 0; opacity: 0; transition: 0.3s; }
        
        .food-card:hover .food-intro { opacity: 1; }

        .category-tag { font-size: 11px; color: #84643a; font-weight: bold; }
        
        /* 管理員表單 */
        .form-container { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed #d4a373; margin-bottom: 40px; width: 300px;}
        input, select, textarea { width: 100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

<header>🍴 提瓦特美食札記</header>

<div class="filter-box">
    <label>🔍 翻閱品項：</label>
    <select id="filterCategory" style="border:none; outline:none; cursor:pointer; font-size: 16px;">
        <option value="全部">全部顯示</option>
        <option value="主食">主食</option>
        <option value="飲品">飲品</option>
        <option value="點心">點心</option>
    </select>
</div>

<div class="form-container" id="adminForm">
    <input type="text" id="name" placeholder="料理名稱">
    <select id="category"><option value="主食">主食</option><option value="飲品">飲品</option><option value="點心">點心</option></select>
    <textarea id="intro" placeholder="介紹..."></textarea>
    <input type="text" id="foodImgUrl" placeholder="圖片網址">
    <button onclick="addFood()" style="width:100%; background:#84643a; color:white; border:none; padding:10px; cursor:pointer;">收錄</button>
</div>

<div id="displayArea"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCObKMkSnYZip04WBNyPC5gIDabK2VYevE",
        authDomain: "genshin-food-cloud.firebaseapp.com",
        projectId: "genshin-food-cloud",
        storageBucket: "genshin-food-cloud.firebasestorage.app",
        messagingSenderId: "77374518719",
        appId: "1:77374518719:web:fd859216db13a4b55e5d0a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const isAdmin = new URLSearchParams(window.location.search).get('mode') === 'admin';
    if (isAdmin) document.getElementById('adminForm').style.display = 'block';

    let allFoods = [];

    onSnapshot(query(collection(db, "foods"), orderBy("createdAt", "desc")), (snapshot) => {
        allFoods = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderFoods(document.getElementById('filterCategory').value);
    });

    function renderFoods(filter) {
        const area = document.getElementById('displayArea');
        area.innerHTML = '';
        const list = filter === "全部" ? allFoods : allFoods.filter(f => f.category === filter);
        
        list.forEach(f => {
            area.innerHTML += `
                <div class="food-card">
                    <img src="${f.image}">
                    <div class="food-content">
                        <span class="category-tag"># ${f.category}</span>
                        <div class="food-name">${f.name}</div>
                        <p class="food-intro">${f.intro}</p>
                        ${isAdmin ? `<button onclick="deleteFood('${f.id}')" style="margin-top:10px; color:red; border:none; background:none; cursor:pointer; font-size:10px;">[撕掉此頁]</button>` : ''}
                    </div>
                </div>`;
        });
    }

    document.getElementById('filterCategory').onchange = (e) => renderFoods(e.target.value);

    window.addFood = async () => {
        const name = document.getElementById('name').value;
        const img = document.getElementById('foodImgUrl').value;
        if(!name || !img) return alert("填寫完整！");
        await addDoc(collection(db, "foods"), {
            name, image: img, category: document.getElementById('category').value,
            intro: document.getElementById('intro').value, createdAt: Date.now()
        });
        location.reload();
    };

    window.deleteFood = async (id) => { if(confirm("確定撕掉？")) await deleteDoc(doc(db,"foods",id)); };

    // ✨ 香氣粒子保留
    document.addEventListener('mousemove', (e) => {
        if (Math.random() > 0.9) {
            const p = document.createElement('div');
            p.innerHTML = '✨'; p.style.position = 'fixed'; p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            p.style.pointerEvents = 'none'; p.style.color = '#d4a373'; p.style.fontSize = '10px'; p.style.zIndex = '100';
            document.body.appendChild(p);
            setTimeout(() => { p.style.transition = '1s'; p.style.transform = 'translateY(-40px)'; p.style.opacity = '0'; }, 10);
            setTimeout(() => p.remove(), 1000);
        }
    });
</script>
</body>
</html>
