<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>提瓦特美食札記</title>
    <style>
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #f4f1e9; margin: 0; 
            display: flex; flex-direction: column; align-items: center; color: #4a3e2e;
            background-image: radial-gradient(#d4a373 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            overflow-x: hidden;
        }
        header { padding: 40px 0 20px 0; font-size: 32px; font-weight: bold; letter-spacing: 5px; color: #84643a; }
        .gallery-container { display: flex; justify-content: center; gap: 30px; padding: 40px 0; }
        .gallery-item { 
            position: relative; background: white; padding: 10px 10px 35px 10px;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #e8e4d8; width: 200px;
        }
        .gallery-item:nth-child(1) { transform: rotate(-4deg); }
        .gallery-item:nth-child(2) { transform: rotate(2deg); }
        .gallery-item:nth-child(3) { transform: rotate(-2deg); }
        .gallery-item:hover { transform: scale(1.1) rotate(0deg); z-index: 100; }
        .gallery-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .bubble {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%) scale(0.8);
            background: #fffdf7; border: 1.5px solid #d4a373; padding: 8px 15px;
            border-radius: 15px; font-size: 13px; color: #84643a; white-space: nowrap;
            opacity: 0; pointer-events: none; transition: all 0.3s ease;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1); z-index: 110;
        }
        .bubble::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%); border-width: 8px 8px 0;
            border-style: solid; border-color: #d4a373 transparent transparent;
        }
        .gallery-item:hover .bubble { opacity: 1; top: -60px; transform: translateX(-50%) scale(1); }
        .filter-box { margin-bottom: 30px; background: white; padding: 10px 25px; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #d4a373; }
        #displayArea { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px; width: 90%; max-width: 1100px; padding-bottom: 50px; }
        .food-card { background: white; border-radius: 5px; overflow: hidden; box-shadow: 2px 5px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column; transition: all 0.5s; border: 1px solid #e8e4d8; padding: 12px 12px 0 12px; }
        .food-card:hover { transform: rotate(0deg) translateY(-10px); z-index: 10; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .food-card img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; border-radius: 3px; }
        .food-content { padding: 15px 5px; max-height: 50px; transition: max-height 0.5s; overflow: hidden; background: white; }
        .food-card:hover .food-content { max-height: 300px; }
        .food-name { font-size: 18px; font-weight: bold; color: #5d4037; border-bottom: 1px dashed #d4a373; padding-bottom: 5px; }
        .food-intro { font-size: 14px; color: #7d6b5d; line-height: 1.6; padding-top: 10px; margin: 0; opacity: 0; transition: 0.3s; }
        .food-card:hover .food-intro { opacity: 1; }
        .category-tag { font-size: 11px; color: #84643a; font-weight: bold; }
        .form-container { display: none; background: white; padding: 25px; border-radius: 15px; border: 2px dashed #d4a373; margin-bottom: 40px; width: 320px;}
        input, select, textarea { width: 100%; margin-bottom: 10px; padding: 8px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .comment-section { width: 90%; max-width: 800px; margin: 50px 0 100px 0; background: #fffdf7; border: 1px solid #d4a373; padding: 30px; box-shadow: 8px 8px 0px #d4a373; position: relative; }
        .comment-section h3 { margin-top: 0; color: #84643a; border-left: 5px solid #d4a373; padding-left: 10px; }
        .comment-input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .comment-input-group input { flex: 1; min-width: 150px; border: 1px solid #d4a373; background: transparent; }
        .comment-input-group button { background: #84643a; color: white; border: none; padding: 0 20px; height: 35px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .comment-list { max-height: 400px; overflow-y: auto; }
        .comment-item { padding: 15px 0; border-bottom: 1px dashed #e8e4d8; display: flex; justify-content: space-between; align-items: flex-start; }
        .btn-delete { color: #e57373; border: 1px solid #e57373; background: none; cursor: pointer; font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-left: 10px; }
        .storage-hint { font-size: 11px; color: #d4a373; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>🍴 提瓦特美食札記</header>

<div class="gallery-container">
    <div class="gallery-item">
        <div class="bubble">我不是應急食品？</div>
        <img id="img1" src="https://via.placeholder.com/400x400?text=美食展示 1">
    </div>
    <div class="gallery-item">
        <div class="bubble">今天也要好好吃飯喔！</div>
        <img id="img2" src="https://via.placeholder.com/400x400?text=美食展示 2">
    </div>
    <div class="gallery-item">
        <div class="bubble">三彩糰子...好吃</div>
        <img id="img3" src="https://via.placeholder.com/400x400?text=美食展示 3">
    </div>
</div>

<div class="filter-box">
    <label>🔍 翻閱品項：</label>
    <select id="filterCategory">
        <option value="全部">全部顯示</option>
        <option value="主食">主食</option>
        <option value="飲品">飲品</option>
        <option value="點心">點心</option>
    </select>
</div>

<div class="form-container" id="adminForm">
    <div class="storage-hint">💡 已繞過 Storage，請直接填入圖片網址</div>
    <input type="text" id="name" placeholder="料理名稱">
    <select id="category">
        <option value="主食">主食</option>
        <option value="飲品">飲品</option>
        <option value="點心">點心</option>
    </select>
    <textarea id="intro" placeholder="介紹..."></textarea>
    <input type="text" id="foodImageUrl" placeholder="圖片網址 (例如: https://i.imgur.com/xxx.png)">
    <button id="addBtn" onclick="addFood()" style="width:100%; background:#84643a; color:white; border:none; padding:10px; cursor:pointer;">收錄</button>
</div>

<div id="displayArea"></div>

<div class="comment-section">
    <h3>📜 食客留書</h3>
    <div class="comment-input-group">
        <input type="text" id="commentUser" placeholder="冒險者大名">
        <input type="text" id="commentContent" placeholder="想說的話...">
        <button id="commentBtn" onclick="sendComment()">留言</button>
    </div>
    <div id="commentList" class="comment-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCObKMkSnYZip04WBNyPC5gIDabK2VYevE",
        authDomain: "genshin-food-cloud.firebaseapp.com",
        projectId: "genshin-food-cloud",
        storageBucket: "genshin-food-cloud.appspot.com",
        messagingSenderId: "77374518719",
        appId: "1:77374518719:web:fd859216db13a4b55e5d0a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const isAdmin = new URLSearchParams(window.location.search).get('mode') === 'admin';
    if (isAdmin) document.getElementById('adminForm').style.display = 'block';

    // --- 1. 監聽數據渲染 ---
    let allFoods = [];
    onSnapshot(query(collection(db, "foods"), orderBy("createdAt", "desc")), (snapshot) => {
        allFoods = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderFoods(document.getElementById('filterCategory').value);
    });

    function renderFoods(filter) {
        const area = document.getElementById('displayArea');
        area.innerHTML = '';
        const list = filter === "全部" ? allFoods : allFoods.filter(f => f.category === filter);
        list.forEach(f => {
            const card = document.createElement('div');
            card.className = 'food-card';
            card.innerHTML = `
                <img src="${f.image}" onerror="this.src='https://via.placeholder.com/300x200?text=圖片失效'">
                <div class="food-content">
                    <span class="category-tag"># ${f.category}</span>
                    <div class="food-name">${f.name}</div>
                    <p class="food-intro">${f.intro}</p>
                </div>`;
            
            if (isAdmin) {
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete';
                delBtn.innerText = '[撕掉此頁]';
                delBtn.onclick = () => deleteFood(f.id);
                card.querySelector('.food-content').appendChild(delBtn);
            }
            area.appendChild(card);
        });
    }

    // --- 2. 核心功能函式 ---
    window.addFood = async () => {
        const name = document.getElementById('name').value;
        const imageUrl = document.getElementById('foodImageUrl').value;
        const category = document.getElementById('category').value;
        const intro = document.getElementById('intro').value;

        if(!name || !imageUrl) return alert("請填寫名稱並貼上圖片網址！");

        const btn = document.getElementById('addBtn');
        btn.disabled = true;
        btn.innerText = "寫入中...";

        try {
            await addDoc(collection(db, "foods"), {
                name, image: imageUrl, category, intro, createdAt: Date.now()
            });
            alert("收錄成功！");
            document.getElementById('name').value = '';
            document.getElementById('foodImageUrl').value = '';
            document.getElementById('intro').value = '';
        } catch (e) {
            alert("收錄失敗：" + e.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "收錄";
        }
    };

    // --- 3. 留言板 ---
    onSnapshot(query(collection(db, "comments"), orderBy("createdAt", "desc")), (snapshot) => {
        const listArea = document.getElementById('commentList');
        listArea.innerHTML = '';
        snapshot.forEach(docSnap => {
            const c = docSnap.data();
            const item = document.createElement('div');
            item.className = 'comment-item';
            item.innerHTML = `<div>👤 <b>${c.user}</b>: ${c.content}</div>`;
            if (isAdmin) {
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-delete';
                delBtn.innerText = '刪除';
                delBtn.onclick = () => deleteDoc(doc(db, "comments", docSnap.id));
                item.appendChild(delBtn);
            }
            listArea.appendChild(item);
        });
    });

    window.sendComment = async () => {
        const user = document.getElementById('commentUser').value;
        const content = document.getElementById('commentContent').value;
        if(!user || !content) return alert("請填寫名字與內容");
        await addDoc(collection(db, "comments"), { user, content, createdAt: Date.now() });
        document.getElementById('commentContent').value = '';
    };

    window.deleteFood = async (id) => { 
        if(confirm("確定撕掉這一頁嗎？")) await deleteDoc(doc(db, "foods", id)); 
    };

    document.getElementById('filterCategory').onchange = (e) => renderFoods(e.target.value);
</script>
</body>
</html>
